services:
  backend:
    build: ./backend
    ports:
      - "5001:5000"
    restart: always
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    # ADD THESE TWO LINES BELOW:
    volumes:
      - c:\woodencraft_permanent_uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always