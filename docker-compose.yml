services:
  backend:
    build: ./backend
    ports:
      - "5001:5000"   # Maps your computer's port 5001 to the container's internal port 5000
    restart: always
    environment:
      - PORT=5000     # Force the internal app to run on 5000 where it wants to be
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always